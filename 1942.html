<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1942 Remake · 纵版飞行射击</title>
<link rel="stylesheet" href="css/game-common.css">
<script src="js/game-audio-helper.js"></script>
<style>
  :root { --bg:#0a0e14; --panel:#121826; --accent:#3da9fc; --warn:#ef4444; --txt:#e6edf3; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font-family: "Segoe UI", system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #stage { position:relative; }
  #game { display:block; background:#05070c; height:92vh; max-width:96vw;
    border:2px solid #1f2a3a; border-radius:10px; box-shadow:0 0 40px rgba(61,169,252,.15); touch-action:none; }
  #touch { position:absolute; right:14px; bottom:14px; display:flex; flex-direction:column; gap:12px; }
  #touch button { width:64px; height:64px; border-radius:50%; border:2px solid rgba(61,169,252,.6);
    background:rgba(18,24,38,.8); color:var(--txt); font-weight:700; font-size:13px; letter-spacing:1px; }
  #touch button:active { transform:scale(.92); background:rgba(61,169,252,.35); }
  #topBtns { position:absolute; left:14px; top:14px; display:flex; gap:10px; }
  #topBtns button { width:44px; height:44px; border-radius:10px; border:1px solid #2a3650;
    background:rgba(18,24,38,.75); color:var(--txt); font-size:18px; }
  #topBtns button:active { background:rgba(61,169,252,.3); }
  .hint { position:absolute; bottom:8px; left:0; right:0; text-align:center; font-size:11px; color:#5b6b82; pointer-events:none; }

  /* ---------- 开始/设置菜单 ---------- */
  .menu { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:20;
    background:radial-gradient(ellipse at center, rgba(10,14,20,.72), rgba(5,7,12,.96)); }
  .menu-card { width:min(430px, 94%); background:var(--panel); border:1px solid #2a3650; border-radius:16px;
    padding:26px 22px; box-shadow:0 0 50px rgba(61,169,252,.2); text-align:center; }
  .menu-card h1 { margin:0; font-size:46px; letter-spacing:6px; color:var(--accent);
    text-shadow:0 0 18px rgba(61,169,252,.5); }
  .menu-card .sub { margin:4px 0 16px; font-size:13px; color:#94a3b8; }
  .last { font-size:12px; color:#ffd166; min-height:16px; margin-bottom:12px; }
  .seg { display:flex; gap:10px; justify-content:center; margin-bottom:16px; }
  .seg-btn { flex:1; padding:12px 0; border-radius:10px; border:1px solid #2a3650; background:#0e1422;
    color:#e6edf3; font-size:16px; font-weight:700; cursor:pointer; transition:all .15s; }
  .seg-btn.active { background:var(--accent); border-color:var(--accent); color:#04121f; }
  .binds { margin-bottom:16px; }
  .bind-row { margin-bottom:12px; }
  .bind-title { font-size:12px; color:#94a3b8; margin-bottom:6px; text-align:left; }
  .bind-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }
  .bind-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 4px; border-radius:8px;
    border:1px solid #2a3650; background:#0e1422; color:#e6edf3; cursor:pointer; transition:all .15s; }
  .bind-btn:hover { border-color:var(--accent); }
  .bind-btn.capturing { border-color:#ffd166; color:#ffd166; }
  .bind-btn .bl { font-size:11px; color:#94a3b8; }
  .bind-btn .bk { font-size:15px; font-weight:700; }
  .primary { width:100%; padding:14px 0; border-radius:10px; border:none; background:var(--accent); color:#04121f;
    font-size:17px; font-weight:800; cursor:pointer; margin-bottom:10px; }
  .primary:hover { filter:brightness(1.08); }
  .ghost { width:100%; padding:11px 0; border-radius:10px; border:1px solid #2a3650; background:transparent;
    color:#94a3b8; font-size:14px; cursor:pointer; transition:all .15s; }
  .ghost:hover { border-color:var(--warn); color:var(--warn); }
  .reset-binds { display:block; margin:6px auto 0; font-size:12px; color:#94a3b8; background:none; border:none;
    cursor:pointer; text-decoration:underline; }
  .reset-binds:hover { color:var(--accent); }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" width="480" height="640"></canvas>
  <div id="topBtns">
    <button id="btnPause" title="暂停 (P)">⏸</button>
    <button id="btnMute" title="静音 (M)">🔊</button>
  </div>
  <div id="touch">
    <button id="btnLoop" title="桶滚闪避 (K/Shift)">LOOP</button>
  </div>
  <div class="hint">P1：WASD 移动 · J 射击 · K 桶滚 ｜ P2：方向键 · . 射击 · / 桶滚 ｜ 设置界面可自定义键位 · P 暂停 · M 静音 ｜ 触屏：拖拽移动 · 自动射击</div>

  <!-- 开始 / 设置 菜单 -->
  <div id="menu" class="menu">
    <div class="menu-card">
      <h1>1942</h1>
      <p class="sub">纵版飞行射击 · 复刻版</p>
      <div id="lastScore" class="last"></div>
      <div class="seg">
        <button id="mode1" class="seg-btn">1 人</button>
        <button id="mode2" class="seg-btn">2 人</button>
      </div>
      <div id="binds" class="binds"></div>
      <button id="btnStart" class="primary">开始游戏</button>
      <button id="btnExit" class="ghost">退出 / 关闭</button>
      <button id="resetBinds" class="reset-binds">恢复默认键位</button>
    </div>
  </div>

  <!-- 退出后的兜底提示 -->
  <div id="closed" class="menu" style="display:none">
    <div class="menu-card">
      <h1>已退出</h1>
      <p class="sub">游戏已关闭，请手动关闭此标签页。感谢游玩！</p>
    </div>
  </div>
</div>

<script>
"use strict";
/* =========================================================================
   1942 REMAKE — 纯 HTML5 Canvas 纵版射击 (单文件, 无依赖)
   支持 1人 / 2人 合作模式 + 可自定义键位
   ========================================================================= */
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const W = 480, H = 640;
const DPR = Math.min(window.devicePixelRatio || 1, 2);
cvs.width = W * DPR; cvs.height = H * DPR;
ctx.scale(DPR, DPR);

/* ----------------------------- 平衡配置 (CFG) -----------------------------
   所有数值均为初始假设，对应 GDD 的 Economy Balance 表。 */
const CFG = {
  PLAYER_SPEED: 260,
  START_LIVES: 3,
  LIVES_CAP: 5,
  HIT_INVULN: 2.0,
  LOOP_DURATION: 1.3,
  LOOP_COOLDOWN: 0.4,
  LOOP_START: 5,        // 开局 5 颗星(桶滚充能)
  LOOP_CHARGE_CAP: 8,   // 上限留出成长空间(每关+1、POW 道具可补)
  FIRE_INTERVAL: 0.18,
  FIRE_INTERVAL_T3: 0.13,
  BULLET_SPEED: 560,
  BULLET_DMG: 1,
  POW_DROP_CHANCE: 0.06,
  COMBO_STEP: 5,
  COMBO_CAP: 8,
  ENEMY_BULLET_SPEED: 200,
  SPAWN_DURATION: 22,
  BOSS_HP_BASE: 60,
  BOSS_HP_PER_LEVEL: 25,
  SCORE_GRUNT: 100,
  SCORE_SWERVER: 150,
  SCORE_DIVER: 150,
  SCORE_SHOOTER: 200,
  SCORE_BOSS_BASE: 5000,
};

/* ------------------------------- 键位配置 ------------------------------- */
const DEFAULT_BINDS = {
  1: { up:'KeyW', down:'KeyS', left:'KeyA', right:'KeyD', fire:'KeyJ', loop:'KeyK' },
  2: { up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight', fire:'Period', loop:'Slash' },
};
const ACTIONS = [
  { k:'up', label:'上' }, { k:'down', label:'下' }, { k:'left', label:'左' },
  { k:'right', label:'右' }, { k:'fire', label:'射击' }, { k:'loop', label:'桶滚' },
];
function loadBinds() {
  const b = JSON.parse(JSON.stringify(DEFAULT_BINDS));
  try {
    const s = localStorage.getItem('1942_keybinds');
    if (s) { const o = JSON.parse(s); for (const pid of [1, 2]) if (o[pid]) Object.assign(b[pid], o[pid]); }
  } catch (e) {}
  return b;
}
function saveBinds() { try { localStorage.setItem('1942_keybinds', JSON.stringify(keyBinds)); } catch (e) {} }
let keyBinds = loadBinds();
function keyName(code) {
  if (!code) return '—';
  if (code.startsWith('Key')) return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  if (code.startsWith('Arrow')) return { ArrowUp:'↑', ArrowDown:'↓', ArrowLeft:'←', ArrowRight:'→' }[code];
  if (code.startsWith('Numpad')) return 'Num' + code.slice(6);
  const map = { Space:'空格', ShiftLeft:'L-Shift', ShiftRight:'R-Shift', ControlLeft:'L-Ctrl',
    ControlRight:'R-Ctrl', Period:'.', Slash:'/', Comma:',', Semicolon:';', Quote:"'",
    BracketLeft:'[', BracketRight:']', Minus:'-', Equal:'=', Backslash:'\\', Enter:'Enter', Tab:'Tab' };
  return map[code] || code;
}

/* ------------------------------- 工具函数 ------------------------------- */
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
function aabb(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
         Math.abs(a.y - b.y) < (a.h + b.h) / 2;
}
function getComboMult() { return Math.min(CFG.COMBO_CAP, 1 + Math.floor(combo / CFG.COMBO_STEP)); }

/* ------------------------------- 音效 (WebAudio) ------------------------------- */
let actx = null, muted = false;
function audioInit() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === 'suspended') actx.resume();
}
function blip(freq, dur, type, vol) {
  if (muted || !actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  const t = actx.currentTime;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t + dur);
}
function noise(dur, vol) {
  if (muted || !actx) return;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const src = actx.createBufferSource(); src.buffer = buf;
  const g = actx.createGain(); g.gain.value = vol;
  src.connect(g); src.connect(actx.destination); src.start();
}
const sShoot   = () => blip(880, 0.05, 'square', 0.025);
const sExplode = () => noise(0.25, 0.14);
const sHit     = () => { noise(0.3, 0.2); blip(120, 0.25, 'sawtooth', 0.12); };
const sPower   = () => { blip(520, 0.08, 'triangle', 0.1); blip(780, 0.1, 'triangle', 0.1); };
const sLoop    = () => { if (!actx || muted) return; const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine'; const t = actx.currentTime; o.frequency.setValueAtTime(300, t);
  o.frequency.exponentialRampToValueAtTime(900, t + 0.3); g.gain.setValueAtTime(0.12, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35); o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t + 0.35); };

/* ------------------------------- 全局状态 ------------------------------- */
let state = 'MENU';        // MENU | PLAYING | PAUSED | CLOSED
let score = 0, hiscore = 0, level = 1, combo = 0, lastScore = 0;
let numPlayers = 1;
let players = [];
let pBullets = [], eBullets = [], enemies = [], powerups = [], particles = [], floaters = [];
let boss = null, stars = [];
let levelTime = 0, spawnTimer = 0, transition = 0, banner = null;
let shake = 0, timeAcc = 0;
const down = new Set();      // 当前按下的物理按键 code
let capturing = null;        // 键位捕获状态 {pid, action, btn}

try { hiscore = parseInt(localStorage.getItem('1942_hiscore') || '0', 10) || 0; } catch (e) {}
try { const m = parseInt(localStorage.getItem('1942_mode') || '1', 10); if (m === 2) numPlayers = 2; } catch (e) {}

/* ------------------------------- 星空背景 ------------------------------- */
function initStars() {
  stars = [];
  for (let i = 0; i < 90; i++)
    stars.push({ x: rand(0, W), y: rand(0, H), s: rand(0.6, 2.2), v: rand(40, 170) });
}
function updateStars(dt) {
  for (const st of stars) {
    st.y += st.v * dt;
    if (st.y > H) { st.y = -2; st.x = rand(0, W); }
  }
}

/* ------------------------------- 玩家 ------------------------------- */
function makePlayer(id, slot) {
  const x = numPlayers === 2 ? (slot === 0 ? W * 0.36 : W * 0.64) : W / 2;
  return {
    id, slot, x, y: H - 90, w: 26, h: 30,
    color: id === 1 ? '#3da9fc' : '#ff8c42',
    lives: CFG.START_LIVES, weaponTier: 0,
    iframe: 0, looping: 0, loopCd: 0, loopCharges: CFG.LOOP_START,
    fireTimer: 0, loopAngle: 0, dead: false, fireHeld: false, touchFire: false,
  };
}
function tryLoop(p) {
  if (state !== 'PLAYING' || !p || p.dead) return;
  if (p.loopCharges > 0 && p.looping <= 0 && p.loopCd <= 0) {
    p.looping = CFG.LOOP_DURATION;
    p.loopCd = CFG.LOOP_DURATION + CFG.LOOP_COOLDOWN;
    p.loopCharges--;
    sLoop();
  }
}
function playerHit(p) {
  if (p.iframe > 0 || p.looping > 0) return;
  p.lives--;
  p.weaponTier = Math.max(0, p.weaponTier - 1);
  p.iframe = CFG.HIT_INVULN;
  combo = 0;
  for (const b of eBullets) if (Math.hypot(b.x - p.x, b.y - p.y) < 130) b.dead = true;
  shake = 14; sHit();
  burst(p.x, p.y, p.color, 26);
  if (p.lives <= 0) p.dead = true;
  if (players.every((pl) => pl.dead)) gameOver();
}

/* ------------------------------- 射击 ------------------------------- */
function fireWeapon(p) {
  const noseY = p.y - 18;
  const mk = (ang) => {
    const a = ang * Math.PI / 180;
    pBullets.push({ x: p.x, y: noseY, w: 4, h: 12,
      vx: Math.sin(a) * CFG.BULLET_SPEED, vy: -Math.cos(a) * CFG.BULLET_SPEED,
      dmg: CFG.BULLET_DMG, dead: false });
  };
  if (p.weaponTier === 0) mk(0);
  else if (p.weaponTier === 1) { mk(0); pBullets.push({ x: p.x - 9, y: noseY, w: 4, h: 12, vx: 0, vy: -CFG.BULLET_SPEED, dmg: 1, dead: false });
                                    pBullets.push({ x: p.x + 9, y: noseY, w: 4, h: 12, vx: 0, vy: -CFG.BULLET_SPEED, dmg: 1, dead: false }); }
  else { mk(-12); mk(0); mk(12); }
  sShoot();
}
function handleFiring(p, dt) {
  if (state !== 'PLAYING' || p.iframe > 999) return;
  const firing = p.fireHeld || p.touchFire;
  p.fireTimer -= dt;
  if (firing && p.fireTimer <= 0) {
    fireWeapon(p);
    p.fireTimer = p.weaponTier >= 2 ? CFG.FIRE_INTERVAL_T3 : CFG.FIRE_INTERVAL;
  }
}

/* ------------------------------- 敌人 ------------------------------- */
function pickEnemyType(lv) {
  const r = Math.random();
  const shooterChance = Math.min(0.5, 0.05 + lv * 0.04);
  if (r < shooterChance) return 'shooter';
  if (r < shooterChance + 0.25) return 'diver';
  if (r < shooterChance + 0.45) return 'swerver';
  return 'grunt';
}
function spawnEnemy() {
  const type = pickEnemyType(level);
  const x = rand(40, W - 40), y = -30;
  const sm = 1 + level * 0.06;
  const e = { type, x, y, baseX: x, w: 26, h: 28, age: 0, fireTimer: rand(0.6, 1.6), flash: 0, dead: false };
  if (type === 'grunt')   { e.hp = 1; e.score = CFG.SCORE_GRUNT;   e.vy = 95 * sm; }
  if (type === 'swerver') { e.hp = 2; e.score = CFG.SCORE_SWERVER; e.vy = 70 * sm; e.amp = rand(40, 95); e.freq = rand(1.5, 3); }
  if (type === 'diver')   { e.hp = 2; e.score = CFG.SCORE_DIVER;   e.vy = 70 * sm; e.speed = 80 * sm; }
  if (type === 'shooter') { e.hp = 3; e.score = CFG.SCORE_SHOOTER; e.vy = 55 * sm; }
  enemies.push(e);
}
function updateEnemies(dt) {
  for (const e of enemies) {
    e.age += dt; e.flash = Math.max(0, e.flash - dt); e.y += e.vy * dt;
    if (e.type === 'swerver') e.x = e.baseX + Math.sin(e.age * e.freq) * e.amp;
    if (e.type === 'diver') {
      // 朝最近的存活玩家俯冲
      let tx = W / 2;
      let best = Infinity;
      for (const p of players) if (!p.dead) { const d = Math.abs(p.x - e.x); if (d < best) { best = d; tx = p.x; } }
      e.x += Math.sign(tx - e.x) * e.speed * 0.7 * dt;
      e.vy += 130 * dt;
    }
    if (e.type === 'shooter' && e.y > 10 && e.y < H * 0.7) {
      e.fireTimer -= dt;
      if (e.fireTimer <= 0) {
        let tx = W / 2, ty = H;
        let best = Infinity;
        for (const p of players) if (!p.dead) { const d = Math.hypot(p.x - e.x, p.y - e.y); if (d < best) { best = d; tx = p.x; ty = p.y; } }
        const dx = tx - e.x, dy = ty - e.y, d = Math.hypot(dx, dy) || 1;
        eBullets.push({ x: e.x, y: e.y + 10, w: 6, h: 6, vx: dx / d * CFG.ENEMY_BULLET_SPEED, vy: dy / d * CFG.ENEMY_BULLET_SPEED, dead: false });
        e.fireTimer = rand(1.2, 2.0);
      }
    }
    e.x = clamp(e.x, 14, W - 14);
    if (e.y > H + 40) e.dead = true;
  }
  enemies = enemies.filter((e) => !e.dead);
}

/* ------------------------------- Boss ------------------------------- */
function spawnBoss() {
  const elite = (level % 5 === 0);
  const hp = Math.round((CFG.BOSS_HP_BASE + level * CFG.BOSS_HP_PER_LEVEL) * (elite ? 1.5 : 1));
  boss = { x: W / 2, y: -90, ty: 130, hp, maxhp: hp, age: 0, fireTimer: 1.4, elite, entering: true, flash: 0, w: 140, h: 70, dead: false };
  banner = { text: elite ? '⚠ 精英 BOSS' : '⚠ WARNING: BOSS', time: 1.8 };
}
function bossFire(b) {
  const spread = b.elite ? 7 : 5, spd = CFG.ENEMY_BULLET_SPEED;
  for (let i = 0; i < spread; i++) {
    const a = (-40 + (80 / (spread - 1)) * i) * Math.PI / 180;
    eBullets.push({ x: b.x, y: b.y + 20, w: 7, h: 7, vx: Math.sin(a) * spd, vy: Math.cos(a) * spd, dead: false });
  }
  let tx = W / 2, ty = H;
  let best = Infinity;
  for (const p of players) if (!p.dead) { const d = Math.hypot(p.x - b.x, p.y - b.y); if (d < best) { best = d; tx = p.x; ty = p.y; } }
  const dx = tx - b.x, dy = ty - b.y, d = Math.hypot(dx, dy) || 1;
  eBullets.push({ x: b.x, y: b.y + 20, w: 7, h: 7, vx: dx / d * spd * 1.1, vy: dy / d * spd * 1.1, dead: false });
}
function updateBoss(dt) {
  if (!boss) return;
  boss.age += dt; boss.flash = Math.max(0, boss.flash - dt);
  if (boss.entering) {
    boss.y += 70 * dt;
    if (boss.y >= boss.ty) { boss.y = boss.ty; boss.entering = false; }
  } else {
    boss.x = W / 2 + Math.sin(boss.age * 1.2) * (W / 2 - 80);
  }
  if (!boss.entering) {
    boss.fireTimer -= dt;
    if (boss.fireTimer <= 0) { bossFire(boss); boss.fireTimer = Math.max(0.7, 1.6 - level * 0.05); }
  }
}
function bossDefeated() {
  const award = (CFG.SCORE_BOSS_BASE + level * 1000);
  addScore(award);
  floater(boss.x, boss.y, '+' + award, '#ffd166');
  burst(boss.x, boss.y, '#ffd166', 60); burst(boss.x, boss.y, '#ef4444', 40);
  shake = 22; sExplode();
  powerups.push({ x: boss.x, y: boss.y, w: 18, h: 18, vy: 60, kind: 'weapon', dead: false });
  boss = null;
  transition = 2.0;
  banner = { text: 'LEVEL ' + level + ' CLEAR', time: 2.0 };
}

/* ------------------------------- 道具 ------------------------------- */
function maybeDrop(x, y) {
  if (Math.random() < CFG.POW_DROP_CHANCE) {
    const r = Math.random();
    const kind = r < 0.6 ? 'weapon' : (r < 0.85 ? 'loop' : 'life');
    powerups.push({ x, y, w: 18, h: 18, vy: 70, kind, dead: false });
  }
}
function collect(p, pow) {
  if (pow.kind === 'weapon') {
    if (p.weaponTier < 3) { p.weaponTier++; floater(p.x, p.y - 20, 'WPN UP', p.color); }
    else { addScore(500); floater(p.x, p.y - 20, '+500', '#ffd166'); }
  } else if (pow.kind === 'loop') {
    if (p.loopCharges < CFG.LOOP_CHARGE_CAP) {
      p.loopCharges++; floater(p.x, p.y - 20, '★ +1', '#a78bfa');
    } else { addScore(300); floater(p.x, p.y - 20, '+300', '#ffd166'); }
  } else {
    p.lives = Math.min(CFG.LIVES_CAP, p.lives + 1);
    floater(p.x, p.y - 20, '1UP', '#34d399');
  }
  sPower();
}

/* ------------------------------- 粒子 / 飘字 ------------------------------- */
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2), sp = rand(40, 260);
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: rand(0.3, 0.8), max: 0.8, color, size: rand(1.5, 4), dead: false });
  }
}
function floater(x, y, text, color) { floaters.push({ x, y, text, color, life: 1.0, dead: false }); }
function updateParticles(dt) {
  for (const p of particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.94; p.vy *= 0.94; p.life -= dt; if (p.life <= 0) p.dead = true; }
  particles = particles.filter((p) => !p.dead);
  for (const f of floaters) { f.y -= 30 * dt; f.life -= dt; if (f.life <= 0) f.dead = true; }
  floaters = floaters.filter((f) => !f.dead);
}

/* ------------------------------- 得分 / 状态 ------------------------------- */
function addScore(a) { score += a; if (score > hiscore) hiscore = score; }
function killEnemy(e) {
  e.dead = true;
  const award = e.score * getComboMult();
  addScore(award); combo++;
  floater(e.x, e.y, '+' + award, '#e6edf3');
  burst(e.x, e.y, '#ff8c42', 18);
  sExplode();
  maybeDrop(e.x, e.y);
}
function nextLevel() {
  level++; levelTime = 0; spawnTimer = 0; boss = null;
  for (const p of players) p.loopCharges = Math.min(CFG.LOOP_CHARGE_CAP, p.loopCharges + 1);
  banner = { text: 'LEVEL ' + level, time: 1.4 };
}
function gameOver() {
  state = 'MENU';
  lastScore = score;
  try { localStorage.setItem('1942_hiscore', String(hiscore)); } catch (e) {}
  refreshMenuHeader();
  syncChrome();
}
function resetGame() {
  score = 0; level = 1; combo = 0;
  players = [];
  for (let i = 0; i < numPlayers; i++) players.push(makePlayer(i + 1, i));
  pBullets = []; eBullets = []; enemies = []; powerups = []; particles = []; floaters = [];
  boss = null; levelTime = 0; spawnTimer = 0.6; transition = 0;
  banner = { text: 'LEVEL 1', time: 1.4 };
}
function startGame() { audioInit(); resetGame(); state = 'PLAYING'; syncChrome(); }

/* ------------------------------- 关卡导演 ------------------------------- */
function updateSpawning(dt) {
  levelTime += dt;
  if (levelTime < CFG.SPAWN_DURATION && !boss) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) { spawnEnemy(); spawnTimer = Math.max(0.35, 1.2 - level * 0.05); }
  } else if (!boss) {
    spawnBoss();
  }
}

/* ------------------------------- 子弹更新 ------------------------------- */
function updateBullets(dt) {
  for (const b of pBullets) { b.x += b.vx * dt; b.y += b.vy * dt; if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) b.dead = true; }
  for (const b of eBullets) { b.x += b.vx * dt; b.y += b.vy * dt; if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) b.dead = true; }
  pBullets = pBullets.filter((b) => !b.dead);
  eBullets = eBullets.filter((b) => !b.dead);
}
function updatePowerups(dt) {
  for (const p of powerups) { p.y += p.vy * dt; if (p.y > H + 20) p.dead = true; }
  powerups = powerups.filter((p) => !p.dead);
}

/* ------------------------------- 碰撞 ------------------------------- */
function checkCollisions() {
  // 玩家子弹 vs 敌人 / Boss
  for (const b of pBullets) {
    if (b.dead) continue;
    for (const e of enemies) {
      if (e.dead) continue;
      if (aabb(b, e)) { b.dead = true; e.hp -= b.dmg; e.flash = 0.08; if (e.hp <= 0) killEnemy(e); break; }
    }
    if (!b.dead && boss && aabb(b, boss)) { b.dead = true; boss.hp -= b.dmg; boss.flash = 0.08; if (boss.hp <= 0) bossDefeated(); }
  }
  // 敌弹 vs 玩家
  for (const b of eBullets) {
    if (b.dead) continue;
    for (const p of players) { if (!p.dead && aabb(b, p)) { b.dead = true; playerHit(p); } }
  }
  // 敌人机体 vs 玩家
  for (const e of enemies) {
    if (e.dead) continue;
    for (const p of players) { if (!p.dead && aabb(e, p)) { e.dead = true; burst(e.x, e.y, '#ff8c42', 12); playerHit(p); } }
  }
  if (boss) { for (const p of players) { if (!p.dead && aabb(boss, p)) playerHit(p); } }
  // 道具 vs 玩家
  for (const pow of powerups) {
    if (pow.dead) continue;
    for (const p of players) { if (!p.dead && aabb(pow, p)) { pow.dead = true; collect(p, pow); break; } }
  }
  enemies = enemies.filter((e) => !e.dead);
}

/* ------------------------------- 主更新 ------------------------------- */
function update(dt) {
  updateStars(dt);
  if (shake > 0) shake = Math.max(0, shake - 40 * dt);
  if (state === 'PLAYING') {
    for (const p of players) {
      if (p.dead) continue;
      const b = keyBinds[p.id];
      let dx = 0, dy = 0;
      if (down.has(b.left)) dx -= 1; if (down.has(b.right)) dx += 1;
      if (down.has(b.up)) dy -= 1; if (down.has(b.down)) dy += 1;
      if (dx || dy) { const m = Math.hypot(dx, dy) || 1; p.x += dx / m * CFG.PLAYER_SPEED * dt; p.y += dy / m * CFG.PLAYER_SPEED * dt; }
      p.x = clamp(p.x, 16, W - 16);
      p.y = clamp(p.y, 16, H - 16);
      if (p.iframe > 0) p.iframe -= dt;
      if (p.loopCd > 0) p.loopCd -= dt;
      if (p.looping > 0) { p.looping -= dt; p.loopAngle += dt * 16; }
      // 射击：按住各自射击键(或空格给P1)，触屏自动射击
      p.fireHeld = down.has(b.fire) || (p.id === 1 && down.has('Space'));
      if (players[0] === p) p.touchFire = dragging && state === 'PLAYING';
      handleFiring(p, dt);
    }
    if (transition > 0) { transition -= dt; if (transition <= 0) nextLevel(); }
    else updateSpawning(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateBullets(dt);
    updatePowerups(dt);
    updateParticles(dt);
    checkCollisions();
  } else {
    updateParticles(dt);
  }
  if (banner) { banner.time -= dt; if (banner.time <= 0) banner = null; }
}

/* ------------------------------- 绘制 ------------------------------- */
function drawShip(x, y, color, flip, angle) {
  ctx.save(); ctx.translate(x, y); if (flip) ctx.scale(1, -1); if (angle) ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, -18); ctx.lineTo(6, -2); ctx.lineTo(16, 6); ctx.lineTo(6, 8);
  ctx.lineTo(4, 16); ctx.lineTo(-4, 16); ctx.lineTo(-6, 8); ctx.lineTo(-16, 6); ctx.lineTo(-6, -2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#cae9ff'; ctx.beginPath(); ctx.arc(0, -4, 3, 0, 7); ctx.fill();
  ctx.restore();
}
function drawPlayer(p) {
  if (p.dead) return;
  if (p.iframe > 0 && p.looping <= 0 && Math.floor(performance.now() / 80) % 2 === 0) return;
  if (p.looping > 0) {
    ctx.save(); ctx.globalAlpha = 0.4;
    for (let i = 1; i <= 4; i++) drawShip(p.x, p.y + i * 8, p.color, false, 0);
    ctx.restore();
    drawShip(p.x, p.y, p.color, false, p.loopAngle);
  } else {
    drawShip(p.x, p.y, p.color, false, 0);
  }
}
function drawEnemy(e) {
  const c = e.flash > 0 ? '#ffffff' : (e.type === 'shooter' ? '#f25f5c' : (e.type === 'diver' ? '#ff8c42' : '#ef476f'));
  drawShip(e.x, e.y, c, true, 0);
}
function drawBoss() {
  const b = boss;
  ctx.save(); ctx.translate(b.x, b.y);
  ctx.fillStyle = '#6b7280'; ctx.fillRect(-70, -25, 140, 50);
  ctx.fillStyle = '#9ca3af'; ctx.fillRect(-58, -38, 116, 16);
  ctx.fillStyle = '#374151'; ctx.fillRect(-82, -8, 14, 22); ctx.fillRect(68, -8, 14, 22);
  ctx.fillStyle = '#4b5563'; ctx.beginPath(); ctx.arc(0, 0, 20, 0, 7); ctx.fill();
  ctx.fillStyle = b.flash > 0 ? '#ffffff' : (b.elite ? '#a855f7' : '#ef4444');
  ctx.beginPath(); ctx.arc(0, 0, 11, 0, 7); ctx.fill();
  if (b.elite) { ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2; ctx.strokeRect(-74, -42, 148, 84); }
  ctx.restore();
  const bw = 200, bx = (W - bw) / 2, by = 64;
  ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(bx, by, bw, 8);
  ctx.fillStyle = '#ef4444'; ctx.fillRect(bx, by, bw * Math.max(0, b.hp / b.maxhp), 8);
}
function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,.4)'; ctx.fillRect(0, 0, W, 50);
  ctx.fillStyle = '#e6edf3'; ctx.font = '14px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('SCORE ' + score, 8, 20);
  ctx.fillStyle = '#ffd166'; ctx.fillText('HI ' + hiscore, 8, 40);
  ctx.fillStyle = '#e6edf3'; ctx.textAlign = 'right';
  ctx.fillText('LV ' + level, W - 8, 20);
  ctx.fillStyle = '#34d399'; ctx.fillText('x' + getComboMult() + ' COMBO(' + combo + ')', W - 8, 40);
  // 玩家状态
  ctx.font = '12px monospace';
  if (numPlayers === 1 && players[0]) {
    const p = players[0];
    ctx.textAlign = 'left'; ctx.fillStyle = '#e6edf3'; ctx.fillText('LIVES ' + p.lives, 8, 64);
    ctx.fillStyle = '#3da9fc'; ctx.fillText('WPN ' + p.weaponTier, 110, 64);
    ctx.fillStyle = '#a78bfa'; ctx.fillText('★'.repeat(p.loopCharges) + '  ' + p.loopCharges + '星', 168, 64);
  } else {
    players.forEach((p, i) => {
      ctx.textAlign = i === 0 ? 'left' : 'right';
      ctx.fillStyle = p.color;
      const tag = (p.dead ? '💀 ' : '') + 'P' + p.id + ' ♥' + p.lives + ' WPN' + p.weaponTier + ' ★' + p.loopCharges;
      ctx.fillText(tag, i === 0 ? 8 : W - 8, 64 + i * 16);
    });
  }
}
function drawOverlayPanel(title, lines, sub) {
  ctx.fillStyle = 'rgba(5,7,12,.82)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#3da9fc'; ctx.font = 'bold 56px monospace';
  ctx.fillText(title, W / 2, H / 2 - 70);
  ctx.fillStyle = '#e6edf3'; ctx.font = '16px monospace';
  lines.forEach((l, i) => ctx.fillText(l, W / 2, H / 2 - 20 + i * 26));
  if (sub) { ctx.fillStyle = '#ffd166'; ctx.font = 'bold 18px monospace'; ctx.fillText(sub, W / 2, H / 2 + 110); }
}
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shake > 0) ctx.translate(rand(-shake, shake), rand(-shake, shake));
  for (const st of stars) { ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + st.s / 3) + ')'; ctx.fillRect(st.x, st.y, st.s, st.s); }
  for (const p of powerups) {
    ctx.save(); ctx.translate(p.x, p.y);
    ctx.fillStyle = p.kind === 'weapon' ? '#3da9fc' : (p.kind === 'loop' ? '#a78bfa' : '#34d399');
    ctx.fillRect(-9, -9, 18, 18);
    ctx.fillStyle = '#05070c'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.kind === 'weapon' ? 'P' : (p.kind === 'loop' ? 'L' : '1'), 0, 1);
    ctx.restore();
  }
  for (const e of enemies) drawEnemy(e);
  if (boss) drawBoss();
  for (const b of pBullets) { ctx.fillStyle = '#ffd166'; ctx.fillRect(b.x - 2, b.y - 6, 4, 12); }
  for (const b of eBullets) { ctx.fillStyle = '#ff5d5d'; ctx.beginPath(); ctx.arc(b.x, b.y, 3.5, 0, 7); ctx.fill(); }
  for (const p of players) drawPlayer(p);
  for (const p of particles) { ctx.globalAlpha = Math.max(0, p.life / p.max); ctx.fillStyle = p.color; ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size); }
  ctx.globalAlpha = 1;
  for (const f of floaters) { ctx.globalAlpha = Math.max(0, f.life); ctx.fillStyle = f.color; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.fillText(f.text, f.x, f.y); }
  ctx.globalAlpha = 1;
  ctx.restore();

  if (state === 'PLAYING' || state === 'PAUSED') drawHUD();
  if (banner && state === 'PLAYING') {
    ctx.globalAlpha = Math.min(1, banner.time);
    ctx.fillStyle = '#ffd166'; ctx.font = 'bold 30px monospace'; ctx.textAlign = 'center';
    ctx.fillText(banner.text, W / 2, H / 2 - 120); ctx.globalAlpha = 1;
  }
  // MENU / CLOSED 由 DOM 菜单呈现，这里只画 PAUSED
  if (state === 'PAUSED') drawOverlayPanel('PAUSED', ['按 P / 点击 ⏸ 继续'], '');
}

/* ------------------------------- 输入 ------------------------------- */
const PREVENT = new Set(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space']);
window.addEventListener('keydown', (e) => {
  // 键位捕获模式优先
  if (capturing) {
    e.preventDefault();
    if (e.code === 'Escape') { capturing.btn.classList.remove('capturing'); capturing = null; renderBinds(); return; }
    keyBinds[capturing.pid][capturing.action] = e.code;
    saveBinds();
    capturing = null;
    renderBinds();
    return;
  }
  if (PREVENT.has(e.code)) e.preventDefault();
  // 桶滚：仅在按键"刚按下"时触发（避免系统连发）
  for (const p of players) {
    if (!p.dead && state === 'PLAYING' && keyBinds[p.id].loop === e.code && !down.has(e.code)) tryLoop(p);
  }
  down.add(e.code);
  if (e.code === 'Enter') { if (state === 'MENU') startGame(); }
  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (state === 'PLAYING') state = 'PAUSED';
    else if (state === 'PAUSED') { state = 'PLAYING'; syncChrome(); }
  }
  if (e.code === 'KeyM') { muted = !muted; document.getElementById('btnMute').textContent = muted ? '🔇' : '🔊'; }
});
window.addEventListener('keyup', (e) => down.delete(e.code));
window.addEventListener('blur', () => down.clear());

// 触屏：拖拽移动 + 点击开始/重试（触屏仅操控 P1，自动射击）
let dragging = false;
function toCanvas(e) {
  const r = cvs.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}
cvs.addEventListener('pointerdown', (e) => {
  audioInit();
  if (state === 'MENU' || state === 'CLOSED') return;
  if (state === 'PAUSED') { state = 'PLAYING'; syncChrome(); return; }
  if (!players[0]) return;
  dragging = true;
  const p = toCanvas(e);
  players[0].x = clamp(p.x, 16, W - 16); players[0].y = clamp(p.y - 70, 16, H - 16);
});
cvs.addEventListener('pointermove', (e) => {
  if (!dragging || state !== 'PLAYING' || !players[0]) return;
  const p = toCanvas(e);
  players[0].x = clamp(p.x, 16, W - 16); players[0].y = clamp(p.y - 70, 16, H - 16);
});
window.addEventListener('pointerup', () => { dragging = false; });

document.getElementById('btnLoop').addEventListener('pointerdown', (e) => { e.preventDefault(); if (players[0]) tryLoop(players[0]); });
document.getElementById('btnPause').addEventListener('click', () => {
  if (state === 'PLAYING') { state = 'PAUSED'; syncChrome(); }
  else if (state === 'PAUSED') { state = 'PLAYING'; syncChrome(); }
});
document.getElementById('btnMute').addEventListener('click', () => { muted = !muted; document.getElementById('btnMute').textContent = muted ? '🔇' : '🔊'; });

/* ------------------------------- 菜单 / 设置 ------------------------------- */
function renderBinds() {
  const wrap = document.getElementById('binds');
  wrap.innerHTML = '';
  const ids = numPlayers === 2 ? [1, 2] : [1];
  ids.forEach((pid) => {
    const row = document.createElement('div');
    row.className = 'bind-row';
    const title = document.createElement('div');
    title.className = 'bind-title';
    title.textContent = '玩家 ' + pid + (pid === 1 ? '（蓝 · P1）' : '（橙 · P2）');
    row.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'bind-grid';
    ACTIONS.forEach((a) => {
      const btn = document.createElement('button');
      btn.className = 'bind-btn';
      btn.innerHTML = '<span class="bl">' + a.label + '</span><span class="bk">' + keyName(keyBinds[pid][a.k]) + '</span>';
      btn.addEventListener('click', () => startCapture(pid, a.k, btn));
      grid.appendChild(btn);
    });
    row.appendChild(grid);
    wrap.appendChild(row);
  });
}
function startCapture(pid, action, btn) {
  capturing = { pid, action, btn };
  btn.classList.add('capturing');
  btn.querySelector('.bk').textContent = '按键…';
}
function setMode(n) {
  numPlayers = n;
  try { localStorage.setItem('1942_mode', String(n)); } catch (e) {}
  document.getElementById('mode1').classList.toggle('active', n === 1);
  document.getElementById('mode2').classList.toggle('active', n === 2);
  renderBinds();
}
function refreshMenuHeader() {
  const el = document.getElementById('lastScore');
  if (lastScore > 0) el.textContent = '上局得分：' + lastScore + '　最高分：' + hiscore;
  else el.textContent = '最高分：' + hiscore;
}
function syncChrome() {
  const playing = (state === 'PLAYING' || state === 'PAUSED');
  document.getElementById('topBtns').style.display = playing ? 'flex' : 'none';
  document.getElementById('touch').style.display = playing ? 'flex' : 'none';
  document.getElementById('menu').style.display = (state === 'MENU') ? 'flex' : 'none';
  document.getElementById('closed').style.display = (state === 'CLOSED') ? 'flex' : 'none';
}
function exitGame() {
  // 若由脚本打开（功能页 window.open），可直接关闭标签页
  window.close();
  // 兜底：某些环境无法关闭时显示提示
  setTimeout(() => {
    if (!window.closed) { state = 'CLOSED'; syncChrome(); }
  }, 120);
}

document.getElementById('mode1').addEventListener('click', () => setMode(1));
document.getElementById('mode2').addEventListener('click', () => setMode(2));
document.getElementById('btnStart').addEventListener('click', () => startGame());
document.getElementById('btnExit').addEventListener('click', () => exitGame());
document.getElementById('resetBinds').addEventListener('click', () => {
  keyBinds = JSON.parse(JSON.stringify(DEFAULT_BINDS));
  saveBinds(); renderBinds();
});

/* ------------------------------- 主循环 (固定步长) ------------------------------- */
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.25) dt = 0.25;
  timeAcc += dt;
  const STEP = 1 / 60;
  while (timeAcc >= STEP) { update(STEP); timeAcc -= STEP; }
  render();
  requestAnimationFrame(frame);
}
initStars();
setMode(numPlayers);
renderBinds();
refreshMenuHeader();
syncChrome();
requestAnimationFrame(frame);
</script>
</body>
