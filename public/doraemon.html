<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>哆啦A梦 · 大雄救援大作战</title>
<link rel="stylesheet" href="css/game-common.css">
<link rel="stylesheet" href="css/doraemon.css">
<script src="js/game-audio-helper.js"></script>
</head>
<body>
<div id="stage">
  <canvas id="game" width="800" height="450"></canvas>
  <div id="topBtns">
    <button id="btnPause" title="暂停 (P)">⏸</button>
    <button id="btnMute" title="静音 (M)">🔊</button>
  </div>
  <div id="touch">
    <div class="pad left">
      <button id="tLeft" title="左">◀</button>
      <button id="tRight" title="右">▶</button>
    </div>
    <div class="pad right">
      <button id="tJump" title="跳">跳</button>
      <button id="tShoot" title="空气炮">炮</button>
      <button id="tFly" title="竹蜻蜓">翼</button>
    </div>
  </div>
  <div class="hint">← → 移动 · ↑/W/空格 跳 · J/Z 发射(拾★升级) · K/Shift 竹蜻蜓(按住飞) · P 暂停 · M 静音 ｜ 触屏：下方按钮</div>
</div>

<script src="js/doraemon.js"></script>
</body>
</html>
