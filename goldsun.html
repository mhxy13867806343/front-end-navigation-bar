<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>黄金太阳 · 封印篇（复刻纵切片）</title>
<link rel="stylesheet" href="css/game-common.css">
<link rel="stylesheet" href="css/goldsun.css">
<script src="js/game-audio-helper.js"></script>
</head>
<body>
<div id="stage">
  <canvas id="game" width="810" height="450"></canvas>
  <div id="touch">
    <div class="pad left">
      <button id="tLeft" title="左">◀</button>
      <button id="tRight" title="右">▶</button>
      <button id="tUp" title="上">▲</button>
      <button id="tDown" title="下">▼</button>
      <button id="tMenu" title="角色菜单" style="display:none;">角色</button>
    </div>
    <div class="pad right">
      <button id="tA" title="确定/交互">A</button>
    </div>
  </div>
  <div class="hint">方向键移动 · A/回车 交互 · C 角色菜单（S保存/L读取） · 战斗中方向键选指令·回车确认·Esc 返回 ｜ 触屏：下方按钮</div>
</div>

<script src="js/goldsun.js"></script>
</body>
</html>
